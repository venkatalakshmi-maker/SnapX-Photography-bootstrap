<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapX Photography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <nav class="navbar navbar-expand-ig navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                SnapX
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            HOME
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            PHOTOS & VIDEOS
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            CATEGORIES
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            USERS
                        </a>
                    </li>
                     
                </ul>
            </div>


        </div>
    </nav>


    <section class="hero d-flex align-items-center">
        <div class="container">
            <div class="hero-content text-content text-white">
                <h1>
                    Enter a World of Photos & Amazing Awards
                </h1>
                <p>
                    SnapX Photography Website Template
                </p>

                <div class="hero-btns d-flex justify-content-center">
                    <button class="btn btn-warning">
                        Explore SnapX Contest
                    </button>

                    <button class="btn btn-outline-light">
                        Watch Our Videos Now
                    </button>
                </div>
            </div>
        </div>
    </section>




    <section class="featured-contest">
        <div class="container">
            <div class="card-container">
                <div class="image-card">
                    <img src="images/featured-01.jpg" class="img-fluid rounded">

                </div>

                <div class="center-card">
                    <img src="images/featured-02.jpg" class="img-fluid rounded">
                </div>

                <div class="images-card">
                    <img src="images/featured-03.jpg" class="img-fluid rounded">
                </div>
            </div>
            
        </div>
    </section>


    <section class="categories">
        <div class="container">
            <div class="section-header">
                <p>Our Categories</p>


                <h2>
                    Check our Popular Content Categories
                </h2>

                <button class="btn btn-warning">
                    Discover All Categories
                </button>
            </div>

            <div class="row g-4 mt-4 category-cards">
                <div class="col-Ig-3 col-md-6">
                    <div class="cards p-4 text-center shadow">
                        <h5>Nature Pic Contest</h5>
                    </div>
                </div>

                <div class="col-Ig-3 col-md-6">
                    <div class="cards p-4 text-center shadow">
                        <h5>Random Pic Contest</h5>
                    </div>
                </div>

                <div class="col-Ig-3 col-md-6">
                    <div class="cards p-4 text-center shadow">
                        <h5>Portrait Pic Contest</h5>
                    </div>
                </div>

                <div class="col-Ig-3 col-md-6">
                    <div class="cards p-4 text-center shadow">
                        <h5>Space Pic Contest</h5>
                    </div>
                </div>

            </div> 
        </div>
    </section>


    <section clas="previous-contests bg-light">
        <div class="container">
            <div class="section-header">
                <h2>
                    Previous Contests
                </h2>

                <button class="btn btn-dark">
                    View All
                </button>
            </div>

            <div class="row g-4 mt-4 contest-grid">
                <div class="col-Ig-4">
                    
                </div>
            </div>
        </div>
    </section>






























    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
